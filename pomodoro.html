<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F5F4F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Pomodoro Timer</title>
<style>
  /* ── 品牌视觉规范 ──────────────────────
     主色调:   番茄红 #E84C3D / 淡暖灰 #F5F4F0
     辅助色:   深邃灰 #2C3E50 / 柔米白 #FFFFFF / 提醒橙 #F39C12
     字体:     计时数字 等宽粗体700 / 界面文字 无衬线14px400
     圆角:     16px / 间距: ≥16px
     图标:     线性 2px 描边 圆头端点
  ────────────────────────────────────── */
  :root {
    --tomato-red: #E84C3D;
    --warm-bg: #F5F4F0;
    --deep-gray: #2C3E50;
    --white: #FFFFFF;
    --alert-orange: #F39C12;
    --ring-track: #E8E3DB;
    --dot-empty: #D0CCC6;
    --text-secondary: #8B8680;
    --overlay-bg: rgba(44, 62, 80, 0.6);
  }

  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  button, input { font-family: inherit; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--deep-gray);
    background: var(--warm-bg);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 外层卡片 ──────────────────────── */
  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 48px 52px 40px;
    display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 2px 20px rgba(0,0,0,0.04);
    min-width: 360px;
    gap: 0; /* 手动控制间距 */
  }

  /* ── 番茄叶子图标（线性 2px 描边 圆头） ── */
  .tomato-icon {
    margin-bottom: 24px;
  }
  .tomato-icon svg {
    display: block;
  }

  /* ── 会话标签 ──────────────────────── */
  .session-label {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 2px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    transition: color 0.4s;
  }
  .session-label.break-state { color: var(--alert-orange); }

  /* ── 计时器圆环 ────────────────────── */
  .ring-container {
    position: relative; width: 256px; height: 256px; margin-bottom: 32px;
  }
  .ring-svg {
    transform: rotate(-90deg); width: 256px; height: 256px;
  }
  .ring-track {
    fill: none; stroke: var(--ring-track); stroke-width: 10;
  }
  .ring-progress {
    fill: none; stroke: var(--tomato-red); stroke-width: 10;
    stroke-linecap: round; transition: stroke 0.4s;
  }
  .ring-progress.break { stroke: var(--alert-orange); }

  .timer-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center;
  }
  .timer-text__time {
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    font-size: 56px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--deep-gray);
  }
  .timer-text__hint {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .timer-text__hint.visible { opacity: 0.8; }

  /* ── 番茄计数圆点 ──────────────────── */
  .dots {
    display: flex; gap: 12px; margin-bottom: 36px;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--dot-empty); transition: all 0.35s;
  }
  .dot.done {
    background: var(--tomato-red);
    box-shadow: 0 0 6px rgba(232, 76, 61, 0.35);
  }

  /* ── 控制按钮 ──────────────────────── */
  .controls { display: flex; gap: 16px; align-items: center; }

  .btn {
    border: none; cursor: pointer;
    font-size: 14px; font-weight: 400;
    letter-spacing: 1px;
    border-radius: 16px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn--primary {
    background: var(--tomato-red); color: #fff;
    padding: 14px 40px; min-width: 140px;
    box-shadow: 0 4px 16px rgba(232, 76, 61, 0.25);
  }
  .btn--primary:hover {
    filter: brightness(1.06); transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232, 76, 61, 0.35);
  }
  .btn--primary:active { transform: translateY(0); }

  .btn--icon {
    background: transparent; color: var(--text-secondary);
    width: 44px; height: 44px; padding: 0;
    border-radius: 50%;
  }
  .btn--icon:hover { background: rgba(44,62,80,0.06); color: var(--deep-gray); }

  /* 设置按钮在页面右上角 */
  .settings-entry {
    position: fixed; top: 20px; right: 20px;
  }

  /* ── 设置弹窗 ──────────────────────── */
  .overlay {
    position: fixed; inset: 0; background: var(--overlay-bg);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 10;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .overlay__card {
    background: var(--white);
    border-radius: 16px;
    padding: 40px 48px;
    display: flex; flex-direction: column; align-items: center;
    gap: 20px;
    min-width: 320px;
  }
  .overlay__card h2 {
    font-size: 14px; font-weight: 400; letter-spacing: 2px;
    color: var(--text-secondary); margin-bottom: 4px;
  }
  .setting-row {
    display: flex; align-items: center; gap: 16px;
    width: 100%;
  }
  .setting-row label {
    font-size: 14px; font-weight: 400; color: var(--deep-gray);
    width: 64px; text-align: right;
  }
  .setting-row input {
    width: 60px; padding: 10px 8px; border-radius: 16px;
    border: 1.5px solid var(--ring-track); background: var(--white);
    color: var(--deep-gray); font-size: 14px; text-align: center; outline: none;
    transition: border-color 0.2s;
  }
  .setting-row input:focus { border-color: var(--tomato-red); }
  .setting-row span {
    font-size: 14px; color: var(--text-secondary);
  }

  /* ── 响应式 ────────────────────────── */
  @media (max-width: 480px) {
    .card { padding: 36px 28px 32px; min-width: unset; width: calc(100vw - 32px); }
    .ring-container { width: 216px; height: 216px; }
    .ring-svg { width: 216px; height: 216px; }
    .timer-text__time { font-size: 44px; }
    .btn--primary { padding: 12px 32px; min-width: 120px; }
  }

  /* 无障碍 */
  .btn:focus-visible { outline: 2px solid var(--tomato-red); outline-offset: 3px; }
</style>
</head>
<body>

<!-- 设置入口 -->
<button class="btn btn--icon settings-entry" id="btn-settings" title="设置 (Esc)">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<!-- 主卡片 -->
<div class="card">

  <!-- 番茄图标：线性 2px 描边 圆头端点 带叶子 -->
  <div class="tomato-icon">
    <svg width="36" height="44" viewBox="0 0 36 44" fill="none"
         stroke="var(--tomato-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- 叶子 -->
      <path d="M18 14 Q22 6 26 3 Q22 8 20 14"/>
      <!-- 番茄主体 -->
      <ellipse cx="18" cy="26" rx="14" ry="16"/>
      <!-- 高光 -->
      <path d="M12 20 Q14 16 18 16" stroke-width="1.5" opacity="0.4"/>
    </svg>
  </div>

  <!-- 会话标签 -->
  <div class="session-label" id="session-label">专注工作</div>

  <!-- 计时器圆环 -->
  <div class="ring-container">
    <svg class="ring-svg" viewBox="0 0 256 256">
      <circle class="ring-track" cx="128" cy="128" r="112"/>
      <circle class="ring-progress" id="ring" cx="128" cy="128" r="112"
        stroke-dasharray="703.717" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <div class="timer-text__time" id="timer">25:00</div>
      <div class="timer-text__hint" id="hint">按空格键开始</div>
    </div>
  </div>

  <!-- 番茄计数圆点 -->
  <div class="dots" id="dots">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <!-- 控制按钮组 -->
  <div class="controls">
    <button class="btn btn--icon" id="btn-reset" title="重置 (R)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    </button>
    <button class="btn btn--primary" id="btn-start">开始</button>
    <button class="btn btn--icon" id="btn-skip" title="跳过 (→)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"/>
        <line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>
  </div>

</div>

<!-- 设置弹窗 -->
<div class="overlay" id="overlay">
  <div class="overlay__card">
    <h2>设置</h2>
    <div class="setting-row">
      <label for="set-work">工作时长</label>
      <input type="number" id="set-work" min="1" max="120" value="25">
      <span>分钟</span>
    </div>
    <div class="setting-row">
      <label for="set-short">短休息</label>
      <input type="number" id="set-short" min="1" max="30" value="5">
      <span>分钟</span>
    </div>
    <div class="setting-row">
      <label for="set-long">长休息</label>
      <input type="number" id="set-long" min="1" max="60" value="15">
      <span>分钟</span>
    </div>
    <button class="btn btn--primary" id="btn-overlay-close" style="margin-top:8px;">保存</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ═══════════════════════════════════════════════
     常量
  ═══════════════════════════════════════════════ */
  const RING_LEN = 2 * Math.PI * 112; // ≈703.717
  const SESSIONS_BEFORE_LONG = 4;
  const WORK = 'work', SHORT = 'short-break', LONG = 'long-break';
  const LABELS = { [WORK]: '专注工作', [SHORT]: '短休息', [LONG]: '长休息' };

  /* ═══════════════════════════════════════════════
     DOM 引用
  ═══════════════════════════════════════════════ */
  const $timer   = document.getElementById('timer');
  const $ring    = document.getElementById('ring');
  const $label   = document.getElementById('session-label');
  const $dots    = document.getElementById('dots');
  const $btnStart = document.getElementById('btn-start');
  const $overlay = document.getElementById('overlay');
  const $hint    = document.getElementById('hint');

  /* ═══════════════════════════════════════════════
     状态
  ═══════════════════════════════════════════════ */
  let state = {
    session:   WORK,
    workMin:   25,
    shortMin:  5,
    longMin:   15,
    remaining: 25 * 60,
    total:     25 * 60,
    running:   false,
    completed: 0,
    timerId:   null,
  };

  /* ═══════════════════════════════════════════════
     持久化
  ═══════════════════════════════════════════════ */
  function save() {
    localStorage.setItem('pomodoro-state', JSON.stringify({
      workMin: state.workMin, shortMin: state.shortMin, longMin: state.longMin,
      completed: state.completed,
    }));
  }

  function load() {
    try {
      const d = JSON.parse(localStorage.getItem('pomodoro-state'));
      if (d) {
        state.workMin  = d.workMin  || 25;
        state.shortMin = d.shortMin || 5;
        state.longMin  = d.longMin  || 15;
        state.completed = d.completed || 0;
      }
    } catch(e) {}
    state.completed = state.completed % SESSIONS_BEFORE_LONG;
  }

  /* ═══════════════════════════════════════════════
     音频
  ═══════════════════════════════════════════════ */
  function note(freq, type, delay, dur) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.2, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur);
  }

  function playChime() {
    [523.25, 659.25, 783.99].forEach((f, i) => note(f, 'sine', i * 0.18, 0.45));
    if (state.session !== WORK) {
      setTimeout(() => {
        note(880, 'triangle', 0, 0.5);
        setTimeout(() => note(880, 'triangle', 0, 0.5), 200);
      }, 700);
    }
  }

  /* ═══════════════════════════════════════════════
     通知
  ═══════════════════════════════════════════════ */
  function notify(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body, silent: false });
    }
  }

  function requestNotification() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  /* ═══════════════════════════════════════════════
     UI
  ═══════════════════════════════════════════════ */
  function fmtMinSec(s) {
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  function refresh() {
    $timer.textContent = fmtMinSec(state.remaining);

    /* 标签 */
    $label.textContent = LABELS[state.session];
    $label.classList.toggle('break-state', state.session !== WORK);

    /* 圆环 */
    const isBreak = state.session !== WORK;
    $ring.classList.toggle('break', isBreak);
    const progress = state.remaining / state.total;
    $ring.setAttribute('stroke-dashoffset', RING_LEN * (1 - progress));

    /* 圆点 */
    $dots.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('done', i < state.completed)
    );

    /* 按钮文字 */
    if (state.running) {
      $btnStart.textContent = '暂停';
    } else if (state.remaining < state.total) {
      $btnStart.textContent = '继续';
    } else {
      $btnStart.textContent = '开始';
    }

    /* 提示文字 */
    $hint.classList.toggle('visible', !state.running && state.remaining === state.total);
  }

  function setSession(session) {
    state.session = session;
    switch (session) {
      case WORK:  state.total = state.workMin  * 60; break;
      case SHORT: state.total = state.shortMin * 60; break;
      case LONG:  state.total = state.longMin  * 60; break;
    }
    state.remaining = state.total;
    state.running = false;
    clearInterval(state.timerId);
    refresh();
  }

  /* ═══════════════════════════════════════════════
     计时核心
  ═══════════════════════════════════════════════ */
  function tick() {
    state.remaining = Math.max(0, state.remaining - 1);
    refresh();

    if (state.remaining > 0) return;

    /* 计时结束 */
    clearInterval(state.timerId);
    state.running = false;
    playChime();

    if (state.session === WORK) {
      state.completed++;
      notify('番茄钟完成！', '太棒了，休息一下吧~');
    } else {
      notify('休息结束', '准备好开始新的番茄钟了吗？');
    }
    save();

    setTimeout(() => {
      const next = state.session === WORK
        ? (state.completed % SESSIONS_BEFORE_LONG === 0 ? LONG : SHORT)
        : WORK;
      setSession(next);
      save();
    }, 500);
  }

  function start() {
    if (state.running || state.remaining <= 0) return;
    state.running = true;
    refresh();
    requestNotification();
    state.timerId = setInterval(tick, 1000);
  }

  function pause() {
    state.running = false;
    clearInterval(state.timerId);
    refresh();
  }

  function reset() {
    pause();
    state.remaining = state.total;
    refresh();
  }

  function skip() {
    pause();
    if (state.session === WORK) notify('跳过番茄钟', '直接进入休息~');
    const next = state.session === WORK
      ? (state.completed % SESSIONS_BEFORE_LONG === 0 ? LONG : SHORT)
      : WORK;
    setSession(next);
    save();
  }

  /* ═══════════════════════════════════════════════
     设置
  ═══════════════════════════════════════════════ */
  function openSettings() {
    document.getElementById('set-work').value  = state.workMin;
    document.getElementById('set-short').value = state.shortMin;
    document.getElementById('set-long').value  = state.longMin;
    $overlay.classList.add('open');
  }

  function closeSettings() {
    const w = parseInt(document.getElementById('set-work').value, 10);
    const s = parseInt(document.getElementById('set-short').value, 10);
    const l = parseInt(document.getElementById('set-long').value, 10);
    if (w > 0 && w <= 120) state.workMin  = w;
    if (s > 0 && s <= 30)  state.shortMin = s;
    if (l > 0 && l <= 60)  state.longMin  = l;
    $overlay.classList.remove('open');
    setSession(WORK);
    save();
  }

  /* ═══════════════════════════════════════════════
     事件
  ═══════════════════════════════════════════════ */
  $btnStart.addEventListener('click', () => state.running ? pause() : start());
  document.getElementById('btn-reset').addEventListener('click', reset);
  document.getElementById('btn-skip').addEventListener('click', skip);
  document.getElementById('btn-settings').addEventListener('click', openSettings);
  document.getElementById('btn-overlay-close').addEventListener('click', closeSettings);

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key) {
      case ' ':  e.preventDefault(); state.running ? pause() : start(); break;
      case 'Escape':
        $overlay.classList.contains('open') ? closeSettings() : openSettings();
        break;
      case 'ArrowRight': e.preventDefault(); skip();  break;
      case 'r': case 'R':
        if (!e.metaKey && !e.ctrlKey) { e.preventDefault(); reset(); }
        break;
    }
  });

  $overlay.addEventListener('click', e => {
    if (e.target === $overlay) closeSettings();
  });

  /* ═══════════════════════════════════════════════
     初始化
  ═══════════════════════════════════════════════ */
  load();
  setSession(WORK);
  refresh();
  requestNotification();
})();
</script>
</body>
</html>
