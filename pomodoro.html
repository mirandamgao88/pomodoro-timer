<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>🍅 Pomodoro Timer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='none' stroke='%23f5f5f5' stroke-width='2'/><text y='22' x='16' text-anchor='middle' font-size='16'>🍅</text></svg>">
<style>
  :root {
    --bg: #000;
    --face: #f5f5f5;
    --ring-track: #e0e0e0;
    --ring-progress: #1a1a1a;
    --text-on-face: #b6b6b6;
    --text-on-face-dark: #333;
    --text-on-bg: #888;
    --btn-ghost-bg: rgba(255,255,255,0.06);
    --btn-ghost-hover: rgba(255,255,255,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text-on-bg);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ─────────────────────── */
  .header {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px;
    pointer-events: none;
  }
  .header__title {
    font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-on-bg); font-weight: 500;
  }
  .header__btn {
    pointer-events: auto;
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--btn-ghost-bg); color: var(--text-on-bg); font-size: 16px;
    cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center;
  }
  .header__btn:hover { background: var(--btn-ghost-hover); color: #ccc; }

  /* ── Session Label ──────────────── */
  .session-label {
    font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 28px; color: var(--text-on-bg); transition: color .4s;
  }

  /* ── Timer Ring ─────────────────── */
  .ring-container {
    position: relative; width: 280px; height: 280px; margin-bottom: 32px;
  }
  .ring-svg {
    transform: rotate(-90deg); width: 280px; height: 280px;
    /* subtle shadow to lift the white face from black bg */
    filter: drop-shadow(0 0 2px rgba(255,255,255,0.08));
  }
  .ring-face {
    fill: var(--face);
  }
  .ring-track {
    fill: none; stroke: var(--ring-track); stroke-width: 10;
  }
  .ring-progress {
    fill: none; stroke: var(--ring-progress); stroke-width: 10; stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }
  .timer-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center;
  }
  .timer-text__time {
    font-size: 62px; font-weight: 200; font-variant-numeric: tabular-nums;
    letter-spacing: 3px; line-height: 1; color: var(--text-on-face-dark);
  }
  .timer-text__hint {
    font-size: 11px; color: var(--text-on-face); margin-top: 4px; letter-spacing: 1px;
    opacity: 0; transition: opacity .3s;
  }
  .timer-text__hint.visible { opacity: 0.8; }

  /* ── Session Dots ───────────────── */
  .dots {
    display: flex; gap: 10px; margin-bottom: 32px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.15); transition: all .35s;
  }
  .dot.done {
    background: #f5f5f5;
    box-shadow: 0 0 6px rgba(255,255,255,0.3);
  }

  /* ── Controls ───────────────────── */
  .controls { display: flex; gap: 16px; align-items: center; }

  .btn {
    border: none; cursor: pointer; font-size: 13px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; border-radius: 30px;
    padding: 13px 32px; transition: all .2s; font-family: inherit;
  }
  .btn--primary {
    background: var(--face); color: #000; min-width: 130px;
  }
  .btn--primary:hover {
    background: #fff; transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(255,255,255,0.15);
  }
  .btn--primary:active { transform: translateY(0); }
  .btn--ghost {
    background: transparent; color: var(--text-on-bg); padding: 8px;
    font-size: 18px; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  .btn--ghost:hover { background: var(--btn-ghost-bg); color: #ccc; }

  /* ── Settings Modal ─────────────── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.94);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 10;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .overlay h2 {
    font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-on-bg); margin-bottom: 6px;
  }
  .setting-row {
    display: flex; align-items: center; gap: 14px;
  }
  .setting-row label { font-size: 13px; color: var(--text-on-bg); width: 72px; text-align: right; }
  .setting-row input {
    width: 60px; padding: 8px 10px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15); background: #111;
    color: #ccc; font-size: 14px; text-align: center; font-family: inherit; outline: none;
    transition: border-color .2s;
  }
  .setting-row input:focus { border-color: #f5f5f5; }
  .setting-row span { font-size: 12px; color: var(--text-on-bg); }

  /* ── Responsive ─────────────────── */
  @media (max-width: 480px) {
    .ring-container { width: 230px; height: 230px; }
    .ring-svg { width: 230px; height: 230px; }
    .timer-text__time { font-size: 48px; }
    .btn--primary { padding: 12px 24px; min-width: 110px; font-size: 12px; }
  }

  /* ── Focus ring for accessibility ─ */
  .btn:focus-visible { outline: 2px solid rgba(255,255,255,0.5); outline-offset: 3px; }
</style>
</head>
<body>

<div class="header">
  <span class="header__title">🍅 Pomodoro</span>
  <button class="header__btn" id="btn-settings" title="设置 (Esc)">⚙️</button>
</div>

<div class="session-label" id="session-label">专注工作</div>

<div class="ring-container">
  <svg class="ring-svg" viewBox="0 0 280 280">
    <circle class="ring-face" cx="140" cy="140" r="138"/>
    <circle class="ring-track" cx="140" cy="140" r="125"/>
    <circle class="ring-progress" id="ring" cx="140" cy="140" r="125"
      stroke-dasharray="785.398" stroke-dashoffset="0"/>
  </svg>
  <div class="timer-text">
    <div class="timer-text__time" id="timer">25:00</div>
    <div class="timer-text__hint" id="hint">按空格键开始</div>
  </div>
</div>

<div class="dots" id="dots">
  <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
</div>

<div class="controls">
  <button class="btn btn--ghost" id="btn-reset" title="重置">↺</button>
  <button class="btn btn--primary" id="btn-start">开始</button>
  <button class="btn btn--ghost" id="btn-skip" title="跳过">⏭</button>
</div>

<div class="overlay" id="overlay">
  <h2>⚙️ 设置</h2>
  <div class="setting-row">
    <label for="set-work">工作时长</label>
    <input type="number" id="set-work" min="1" max="120" value="25">
    <span>分钟</span>
  </div>
  <div class="setting-row">
    <label for="set-short">短休息</label>
    <input type="number" id="set-short" min="1" max="30" value="5">
    <span>分钟</span>
  </div>
  <div class="setting-row">
    <label for="set-long">长休息</label>
    <input type="number" id="set-long" min="1" max="60" value="15">
    <span>分钟</span>
  </div>
  <button class="btn btn--primary" id="btn-overlay-close" style="margin-top:10px;">保存</button>
</div>

<script>
(function() {
  'use strict';

  // ── Constants ──────────────────────────────────
  const RING_LEN = 2 * Math.PI * 125; // ~785.398
  const SESSIONS_BEFORE_LONG = 4;
  const WORK = 'work', SHORT = 'short-break', LONG = 'long-break';
  const LABELS = { [WORK]: '专注工作', [SHORT]: '短休息', [LONG]: '长休息' };

  // ── DOM ────────────────────────────────────────
  const $timer = document.getElementById('timer');
  const $ring = document.getElementById('ring');
  const $label = document.getElementById('session-label');
  const $dots = document.getElementById('dots');
  const $btnStart = document.getElementById('btn-start');
  const $btnReset = document.getElementById('btn-reset');
  const $btnSkip = document.getElementById('btn-skip');
  const $btnSettings = document.getElementById('btn-settings');
  const $overlay = document.getElementById('overlay');
  const $hint = document.getElementById('hint');

  // ── State ──────────────────────────────────────
  let state = {
    session: WORK,
    workMin: 25,
    shortMin: 5,
    longMin: 15,
    remaining: 25 * 60,
    total: 25 * 60,
    running: false,
    completed: 0,
    timerId: null,
  };

  // ── Persistence ────────────────────────────────
  function save() {
    localStorage.setItem('pomodoro-state', JSON.stringify({
      workMin: state.workMin, shortMin: state.shortMin, longMin: state.longMin,
      completed: state.completed,
    }));
  }

  function load() {
    try {
      const d = JSON.parse(localStorage.getItem('pomodoro-state'));
      if (d) {
        state.workMin = d.workMin || 25;
        state.shortMin = d.shortMin || 5;
        state.longMin = d.longMin || 15;
        state.completed = d.completed || 0;
      }
    } catch(e) {}
    state.completed = state.completed % SESSIONS_BEFORE_LONG;
  }

  // ── Audio ──────────────────────────────────────
  function chime(freq, type, startTime, duration) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.25, ctx.currentTime + startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime + startTime);
    osc.stop(ctx.currentTime + startTime + duration);
  }

  function playEndSound() {
    [523.25, 659.25, 783.99].forEach((f, i) => chime(f, 'sine', i * 0.18, 0.45));
    if (state.session !== WORK) {
      setTimeout(() => {
        chime(880, 'triangle', 0, 0.5);
        setTimeout(() => chime(880, 'triangle', 0, 0.5), 200);
      }, 700);
    }
  }

  // ── Notification ───────────────────────────────
  function notify(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body, silent: false });
    }
  }

  function requestNotification() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  // ── UI ─────────────────────────────────────────
  function formatTime(s) {
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  function updateRing() {
    const progress = state.remaining / state.total;
    $ring.setAttribute('stroke-dashoffset', RING_LEN * (1 - progress));
  }

  function refresh() {
    $timer.textContent = formatTime(state.remaining);
    $label.textContent = LABELS[state.session];
    // Dots
    const dots = $dots.querySelectorAll('.dot');
    dots.forEach((d, i) => d.classList.toggle('done', i < state.completed));
    // Button text
    if (state.running) {
      $btnStart.textContent = '暂停';
    } else if (state.remaining < state.total) {
      $btnStart.textContent = '继续';
    } else {
      $btnStart.textContent = '开始';
    }
    // Hint
    if (!state.running && state.remaining === state.total) {
      $hint.classList.add('visible');
    } else {
      $hint.classList.remove('visible');
    }
    updateRing();
  }

  function setSession(session) {
    state.session = session;
    switch (session) {
      case WORK: state.total = state.workMin * 60; break;
      case SHORT: state.total = state.shortMin * 60; break;
      case LONG: state.total = state.longMin * 60; break;
    }
    state.remaining = state.total;
    state.running = false;
    clearInterval(state.timerId);
    refresh();
  }

  // ── Timer Logic ────────────────────────────────
  function tick() {
    state.remaining--;
    if (state.remaining < 0) state.remaining = 0;

    $timer.textContent = formatTime(state.remaining);
    updateRing();

    if (state.remaining <= 0) {
      clearInterval(state.timerId);
      state.running = false;

      playEndSound();

      if (state.session === WORK) {
        state.completed++;
        notify('🍅 番茄钟完成！', '太棒了！休息一下吧~');
      } else {
        notify('☕ 休息结束', '准备好下一个番茄钟了吗？');
      }

      save();

      setTimeout(() => {
        const next = state.session === WORK
          ? (state.completed % SESSIONS_BEFORE_LONG === 0 ? LONG : SHORT)
          : WORK;
        setSession(next);
        save();
      }, 500);
    }
  }

  function start() {
    if (state.running) return;
    if (state.remaining <= 0) return;

    state.running = true;
    refresh();
    requestNotification();
    state.timerId = setInterval(tick, 1000);
  }

  function pause() {
    state.running = false;
    clearInterval(state.timerId);
    refresh();
  }

  function reset() {
    pause();
    state.remaining = state.total;
    updateRing();
    refresh();
  }

  function skip() {
    pause();
    if (state.session === WORK) {
      notify('⏭ 跳过番茄钟', '直接进入休息~');
    }
    const next = state.session === WORK
      ? (state.completed % SESSIONS_BEFORE_LONG === 0 ? LONG : SHORT)
      : WORK;
    setSession(next);
    save();
  }

  // ── Settings ───────────────────────────────────
  function openSettings() {
    document.getElementById('set-work').value = state.workMin;
    document.getElementById('set-short').value = state.shortMin;
    document.getElementById('set-long').value = state.longMin;
    $overlay.classList.add('open');
  }

  function closeSettings() {
    const w = parseInt(document.getElementById('set-work').value, 10);
    const s = parseInt(document.getElementById('set-short').value, 10);
    const l = parseInt(document.getElementById('set-long').value, 10);
    if (w > 0 && w <= 120) state.workMin = w;
    if (s > 0 && s <= 30) state.shortMin = s;
    if (l > 0 && l <= 60) state.longMin = l;
    $overlay.classList.remove('open');
    setSession(WORK);
    save();
  }

  // ── Events ─────────────────────────────────────
  $btnStart.addEventListener('click', () => state.running ? pause() : start());
  $btnReset.addEventListener('click', reset);
  $btnSkip.addEventListener('click', skip);
  $btnSettings.addEventListener('click', openSettings);
  document.getElementById('btn-overlay-close').addEventListener('click', closeSettings);

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key) {
      case ' ':
        e.preventDefault();
        state.running ? pause() : start();
        break;
      case 'Escape':
        if ($overlay.classList.contains('open')) closeSettings();
        else openSettings();
        break;
      case 'ArrowRight':
        e.preventDefault(); skip(); break;
      case 'r': case 'R':
        if (!e.metaKey && !e.ctrlKey) { e.preventDefault(); reset(); }
        break;
    }
  });

  $overlay.addEventListener('click', e => {
    if (e.target === $overlay) closeSettings();
  });

  // ── Init ───────────────────────────────────────
  load();
  setSession(WORK);
  refresh();
  requestNotification();
})();
</script>
</body>
</html>
