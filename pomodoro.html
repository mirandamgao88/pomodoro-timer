<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FDFFFC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Pomodoro Timer</title>
<style>
  /* ═══════════════════════════════════════════════
     品牌视觉规范 · 夏日多巴胺
     ─────────────────────────────────────────
     主色调:   多巴胺粉 #FF5E7E / 晴空蓝 #4D9DE0 / 亮柠黄 #F9D56E
     辅助色:   活力橙 #FF9F4A / 薄荷绿 #77D0AB / 深海蓝 #293241 / 柔雾白 #FDFFFC
     字体:     计时 等宽粗体 700 · 界面 无衬线 400 14px
     圆角:     16px  ·  间距: ≥16px
     图标:     线性 2px 描边 圆头端点
  ═══════════════════════════════════════════════ */
  :root {
    --pink:     #FF5E7E;
    --blue:     #4D9DE0;
    --yellow:   #F9D56E;
    --orange:   #FF9F4A;
    --mint:     #77D0AB;
    --deep:     #293241;
    --fog:      #FDFFFC;
    --pink-10:  rgba(255,94,126,0.10);
    --pink-25:  rgba(255,94,126,0.25);
    --yellow-25:rgba(249,213,110,0.30);
    --mint-25:  rgba(119,208,171,0.30);
  }

  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  button, input { font-family: inherit; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--deep);
    background: var(--fog);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 卡片 ────────────────────────── */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 44px 52px 40px;
    display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 2px 24px rgba(41,50,65,0.05);
    min-width: 360px;
  }

  /* ── 番茄叶子图标 ────────────────── */
  .tomato-icon { margin-bottom: 20px; }

  /* ── 会话标签 ────────────────────── */
  .session-label {
    font-size: 14px; font-weight: 400; letter-spacing: 2px;
    color: #8B8D97; margin-bottom: 28px; transition: color 0.4s;
  }
  .session-label.short { color: var(--yellow); }
  .session-label.long  { color: var(--mint);  }

  /* ── 计时圆环 ────────────────────── */
  .ring-wrap {
    position: relative; width: 256px; height: 256px; margin-bottom: 28px;
  }
  .ring-svg { transform: rotate(-90deg); width: 256px; height: 256px; }

  .ring-track {
    fill: none; stroke: #EEEBE6; stroke-width: 10;
  }
  .ring-progress {
    fill: none; stroke: var(--pink); stroke-width: 10; stroke-linecap: round;
    transition: stroke 0.4s;
  }
  .ring-progress.short { stroke: var(--yellow); }
  .ring-progress.long  { stroke: var(--mint);  }

  .timer-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center;
  }
  .timer-text__time {
    font-family: 'SF Mono','Menlo','Courier New',monospace;
    font-size: 56px; font-weight: 700; font-variant-numeric: tabular-nums;
    letter-spacing: 2px; line-height: 1; color: var(--deep);
  }
  .timer-text__hint {
    font-size: 13px; font-weight: 400; color: #8B8D97; margin-top: 6px;
    opacity: 0; transition: opacity 0.35s;
  }
  .timer-text__hint.on { opacity: 0.85; }

  /* ── 完成圆点 ────────────────────── */
  .dots { display: flex; gap: 12px; margin-bottom: 36px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; background: #DDD9D3;
    transition: all 0.35s;
  }
  .dot.done { background: var(--orange); box-shadow: 0 0 8px rgba(255,159,74,0.40); }

  /* ── 按钮 ────────────────────────── */
  .controls { display: flex; gap: 16px; align-items: center; }

  .btn {
    border: none; cursor: pointer; font-size: 14px; font-weight: 400;
    letter-spacing: 1px; border-radius: 16px; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn--primary {
    background: var(--pink); color: #fff; padding: 14px 32px; min-width: 140px;
    box-shadow: 0 4px 18px var(--pink-25);
  }
  .btn--primary:hover {
    filter: brightness(1.05); transform: translateY(-1px);
    box-shadow: 0 6px 22px var(--pink-25);
  }
  .btn--primary:active { transform: translateY(0); }

  .btn--icon {
    background: transparent; color: #8B8D97; width: 44px; height: 44px; padding: 0;
    border-radius: 50%;
  }
  .btn--icon:hover { background: var(--pink-10); color: var(--pink); }

  /* 设置入口（右上角固定） */
  .settings-fab { position: fixed; top: 20px; right: 20px; }

  /* ── 设置弹窗 ────────────────────── */
  .overlay {
    position: fixed; inset: 0; background: rgba(41,50,65,0.45);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 10;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .overlay__card {
    background: #fff; border-radius: 16px; padding: 40px 48px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    min-width: 320px;
  }
  .overlay__card h2 {
    font-size: 14px; font-weight: 400; letter-spacing: 2px; color: #8B8D97;
    margin-bottom: 2px;
  }
  .row {
    display: flex; align-items: center; gap: 16px; width: 100%;
  }
  .row label { font-size: 14px; font-weight: 400; color: var(--deep); width: 80px; text-align: right; }
  .row input {
    width: 60px; padding: 10px 8px; border-radius: 16px;
    border: 1.5px solid #DDD9D3; background: #fff;
    color: var(--deep); font-size: 14px; text-align: center; outline: none;
    transition: border-color 0.2s;
  }
  .row input:focus { border-color: var(--pink); }
  .row span { font-size: 14px; color: #8B8D97; }

  /* ── 响应式 ────────────────────────── */
  @media (max-width: 480px) {
    .card { padding: 36px 28px 32px; min-width: unset; width: calc(100vw - 32px); }
    .ring-wrap { width: 216px; height: 216px; }
    .ring-svg  { width: 216px; height: 216px; }
    .timer-text__time { font-size: 44px; }
    .btn--primary { padding: 12px 28px; min-width: 120px; }
  }

  .btn:focus-visible { outline: 2px solid var(--pink); outline-offset: 3px; }
</style>
</head>
<body>

<!-- ═══ 设置按钮 ═══ -->
<button class="btn btn--icon settings-fab" id="btn-settings" title="设置 (Esc)">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<!-- ═══ 主卡片 ═══ -->
<div class="card">

  <!-- 番茄图标：线性 2px 描边 圆头 带叶子 -->
  <div class="tomato-icon">
    <svg width="36" height="46" viewBox="0 0 36 46" fill="none"
         stroke="var(--pink)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- 叶子 -->
      <path d="M18 14 C19 8 22 4 26.5 1.5"/>
      <path d="M18 14 C19 8 16 3 13 1"/>
      <!-- 番茄主体 -->
      <ellipse cx="18" cy="27" rx="15" ry="17"/>
      <!-- 高光弧 -->
      <path d="M12 21 Q14 17 18 16" stroke-width="1.5" opacity="0.4"/>
    </svg>
  </div>

  <!-- 会话标签 -->
  <div class="session-label" id="session-label">专注中</div>

  <!-- 计时圆环 -->
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 256 256">
      <circle class="ring-track" cx="128" cy="128" r="112"/>
      <circle class="ring-progress" id="ring" cx="128" cy="128" r="112"
        stroke-dasharray="703.717" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <div class="timer-text__time" id="timer">25:00</div>
      <div class="timer-text__hint" id="hint">按空格键开始</div>
    </div>
  </div>

  <!-- 完成圆点 -->
  <div class="dots" id="dots">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <!-- 控制按钮 -->
  <div class="controls">
    <button class="btn btn--icon" id="btn-reset" title="重置 (R)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    </button>
    <button class="btn btn--primary" id="btn-start">专注开始啦</button>
    <button class="btn btn--icon" id="btn-skip" title="跳过 (→)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"/>
        <line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>
  </div>

</div>

<!-- ═══ 设置弹窗 ═══ -->
<div class="overlay" id="overlay">
  <div class="overlay__card">
    <h2>设置</h2>
    <div class="row">
      <label for="set-work">专注时长</label>
      <input type="number" id="set-work" min="1" max="120" value="25">
      <span>分钟</span>
    </div>
    <div class="row">
      <label for="set-short">休息时长</label>
      <input type="number" id="set-short" min="1" max="30" value="5">
      <span>分钟</span>
    </div>
    <div class="row">
      <label for="set-long">长休息时长</label>
      <input type="number" id="set-long" min="1" max="60" value="15">
      <span>分钟</span>
    </div>
    <button class="btn btn--primary" id="btn-overlay-close" style="margin-top:6px;">保存</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ═══════════════════════════════════════════════
     常量
  ═══════════════════════════════════════════════ */
  const RING_LEN = 2 * Math.PI * 112; // ≈703.717
  const WORK = 'work', SHORT = 'short', LONG = 'long';
  const SESSIONS_BEFORE_LONG = 4;

  /* ── 文案（来自语言规范） ──────────── */
  const COPY = {
    label:       { [WORK]: '专注中',                      [SHORT]: '小休息',       [LONG]: '长休息' },
    btnIdle:     { [WORK]: '专注开始啦',                   [SHORT]: '休息休息啦',    [LONG]: '休息休息啦' },
    btnPaused:   { [WORK]: '继续专注',                     [SHORT]: '继续',          [LONG]: '继续' },
    btnRunning:  '暂停',
    hintIdle:    '按空格键开始',
    hintWork:    '保持节奏，继续专注',
    hintShort:   '起来走走，喝口水',
    hintLong:    '专注很久了，休息一会儿吧',
    notifWork:   ['番茄完成！真棒', '专注了一个周期，稍作休息吧'],
    notifBreak:  ['休息结束了', '开始新的专注吧'],
    notifSkip:   ['已跳过', '直接进入休息~'],
    setWork:     '专注时长',
    setShort:    '休息时长',
    setLong:     '长休息时长',
  };

  /* ═══════════════════════════════════════════════
     DOM
  ═══════════════════════════════════════════════ */
  const $timer    = document.getElementById('timer');
  const $ring     = document.getElementById('ring');
  const $label    = document.getElementById('session-label');
  const $dots     = document.getElementById('dots');
  const $btnStart = document.getElementById('btn-start');
  const $overlay  = document.getElementById('overlay');
  const $hint     = document.getElementById('hint');

  /* ═══════════════════════════════════════════════
     状态
  ═══════════════════════════════════════════════ */
  let st = {
    session:   WORK,
    workMin:   25,
    shortMin:  5,
    longMin:   15,
    remaining: 25 * 60,
    total:     25 * 60,
    running:   false,
    completed: 0,
    timerId:   null,
  };

  /* ═══════════════════════════════════════════════
     持久化
  ═══════════════════════════════════════════════ */
  function save() {
    localStorage.setItem('pomodo-state', JSON.stringify({
      workMin: st.workMin, shortMin: st.shortMin, longMin: st.longMin,
      completed: st.completed,
    }));
  }
  function load() {
    try {
      const d = JSON.parse(localStorage.getItem('pomodo-state'));
      if (d) {
        st.workMin  = d.workMin  || 25;
        st.shortMin = d.shortMin || 5;
        st.longMin  = d.longMin  || 15;
        st.completed = d.completed || 0;
      }
    } catch(e) {}
    st.completed %= SESSIONS_BEFORE_LONG;
  }

  /* ═══════════════════════════════════════════════
     音频
  ═══════════════════════════════════════════════ */
  function note(freq, type, delay, dur) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.18, ctx.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + delay);
    o.stop(ctx.currentTime + delay + dur);
  }
  function chime() {
    [523.25, 659.25, 783.99].forEach((f,i) => note(f, 'sine', i*0.18, 0.45));
    if (st.session !== WORK) {
      setTimeout(() => {
        note(880, 'triangle', 0, 0.5);
        setTimeout(() => note(880, 'triangle', 0, 0.5), 200);
      }, 700);
    }
  }

  /* ═══════════════════════════════════════════════
     通知
  ═══════════════════════════════════════════════ */
  function notify(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body, silent: false });
    }
  }
  function askNotify() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  /* ═══════════════════════════════════════════════
     UI
  ═══════════════════════════════════════════════ */
  function fmt(sec) {
    return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
  }

  function refresh() {
    $timer.textContent = fmt(st.remaining);

    /* ── 标签 ── */
    $label.textContent = COPY.label[st.session];
    $label.className = 'session-label';
    if (st.session === SHORT) $label.classList.add('short');
    if (st.session === LONG)  $label.classList.add('long');

    /* ── 圆环颜色 + 按钮颜色 ── */
    $ring.className = 'ring-progress';
    if (st.session === SHORT) $ring.classList.add('short');
    if (st.session === LONG)  $ring.classList.add('long');
    const isBreak = st.session !== WORK;
    $btnStart.style.background = isBreak ? 'var(--blue)' : 'var(--pink)';

    /* ── 进度 ── */
    const prog = st.remaining / st.total;
    $ring.setAttribute('stroke-dashoffset', RING_LEN * (1 - prog));

    /* ── 圆点 ── */
    $dots.querySelectorAll('.dot').forEach((d,i) =>
      d.classList.toggle('done', i < st.completed)
    );

    /* ── 按钮文案 ── */
    if (st.running) {
      $btnStart.textContent = COPY.btnRunning;
    } else if (st.remaining < st.total) {
      $btnStart.textContent = COPY.btnPaused[st.session];
    } else {
      $btnStart.textContent = COPY.btnIdle[st.session];
    }

    /* ── 提示文案 ── */
    let hintText = '';
    if (!st.running && st.remaining === st.total) {
      hintText = COPY.hintIdle;
    } else if (st.running) {
      if (st.session === WORK)  hintText = COPY.hintWork;
      if (st.session === SHORT) hintText = COPY.hintShort;
      if (st.session === LONG)  hintText = COPY.hintLong;
    }
    $hint.textContent = hintText;
    $hint.classList.toggle('on', hintText !== '');
  }

  function setSession(session) {
    st.session = session;
    st.total =
      session === WORK  ? st.workMin  * 60 :
      session === SHORT ? st.shortMin * 60 :
                          st.longMin  * 60;
    st.remaining = st.total;
    st.running = false;
    clearInterval(st.timerId);
    refresh();
  }

  /* ═══════════════════════════════════════════════
     计时
  ═══════════════════════════════════════════════ */
  function tick() {
    st.remaining = Math.max(0, st.remaining - 1);
    refresh();

    if (st.remaining > 0) return;

    clearInterval(st.timerId);
    st.running = false;
    chime();

    if (st.session === WORK) {
      st.completed++;
      notify(COPY.notifWork[0], COPY.notifWork[1]);
    } else {
      notify(COPY.notifBreak[0], COPY.notifBreak[1]);
    }
    save();

    setTimeout(() => {
      setSession(
        st.session === WORK
          ? (st.completed % SESSIONS_BEFORE_LONG === 0 ? LONG : SHORT)
          : WORK
      );
      save();
    }, 400);
  }

  function start() {
    if (st.running || st.remaining <= 0) return;
    st.running = true;
    refresh();
    askNotify();
    st.timerId = setInterval(tick, 1000);
  }
  function pause() { st.running = false; clearInterval(st.timerId); refresh(); }
  function reset() { pause(); st.remaining = st.total; refresh(); }
  function skip() {
    pause();
    if (st.session === WORK) notify(COPY.notifSkip[0], COPY.notifSkip[1]);
    setSession(
      st.session === WORK
        ? (st.completed % SESSIONS_BEFORE_LONG === 0 ? LONG : SHORT)
        : WORK
    );
    save();
  }

  /* ═══════════════════════════════════════════════
     设置弹窗
  ═══════════════════════════════════════════════ */
  function openSettings() {
    document.getElementById('set-work').value  = st.workMin;
    document.getElementById('set-short').value = st.shortMin;
    document.getElementById('set-long').value  = st.longMin;
    $overlay.classList.add('open');
  }
  function closeSettings() {
    const w = parseInt(document.getElementById('set-work').value, 10);
    const s = parseInt(document.getElementById('set-short').value, 10);
    const l = parseInt(document.getElementById('set-long').value, 10);
    if (w>=1 && w<=120) st.workMin  = w;
    if (s>=1 && s<=30)  st.shortMin = s;
    if (l>=1 && l<=60)  st.longMin  = l;
    $overlay.classList.remove('open');
    setSession(WORK);
    save();
  }

  /* ═══════════════════════════════════════════════
     事件绑定
  ═══════════════════════════════════════════════ */
  $btnStart.addEventListener('click', () => st.running ? pause() : start());
  document.getElementById('btn-reset').addEventListener('click', reset);
  document.getElementById('btn-skip').addEventListener('click', skip);
  document.getElementById('btn-settings').addEventListener('click', openSettings);
  document.getElementById('btn-overlay-close').addEventListener('click', closeSettings);

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key) {
      case ' ':  e.preventDefault(); st.running ? pause() : start(); break;
      case 'Escape':
        $overlay.classList.contains('open') ? closeSettings() : openSettings(); break;
      case 'ArrowRight': e.preventDefault(); skip();  break;
      case 'r': case 'R':
        if (!e.metaKey && !e.ctrlKey) { e.preventDefault(); reset(); } break;
    }
  });
  $overlay.addEventListener('click', e => { if (e.target === $overlay) closeSettings(); });

  /* ═══════════════════════════════════════════════
     启动
  ═══════════════════════════════════════════════ */
  load();
  setSession(WORK);
  refresh();
  askNotify();
})();
</script>
</body>
</html>
